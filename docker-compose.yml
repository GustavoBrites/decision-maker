services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_DB=decision_maker
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/decision_maker
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "10000:10000"

volumes:
  postgres_data:
